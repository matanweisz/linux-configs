"$schema" = 'https://starship.rs/config-schema.json'

# ------------------------------------------------------------------------------
# PROMPT FORMATTING
# ------------------------------------------------------------------------------
format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
$username\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$kubernetes\
$docker_context\
$terraform\
$aws\
$gcp\
$nodejs\
$rust\
$golang\
$php\
$python\
[](fg:#212736 bg:#1d2230)\
$time\
$cmd_duration\
[ ](fg:#1d2230)\
\n$character"""

# ------------------------------------------------------------------------------
# USERNAME MODULE
# ------------------------------------------------------------------------------
[username]
show_always = true
style_user = "bg:#a3aed2 fg:#090c0c"
style_root = "bg:#a3aed2 fg:#090c0c bold"
format = "[$user ]($style)"
disabled = false

# ------------------------------------------------------------------------------
# DIRECTORY MODULE
# ------------------------------------------------------------------------------
[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# ------------------------------------------------------------------------------
# GIT (Enhanced for DevOps)
# ------------------------------------------------------------------------------
[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
conflicted = " "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ------------------------------------------------------------------------------
# DEVOPS & INFRASTRUCTURE
# ------------------------------------------------------------------------------
[kubernetes]
symbol = "☸ "
disabled = false
style = "bg:#212736"
format = '[[ $symbol$context( \($namespace\)) ](fg:#769ff0 bg:#212736)]($style)'

[docker_context]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol$context ](fg:#769ff0 bg:#212736)]($style)'

[terraform]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol$workspace ](fg:#769ff0 bg:#212736)]($style)'

[aws]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol($profile )(\($region\) )](fg:#769ff0 bg:#212736)]($style)'

[gcloud]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol$account(\($region\)) ](fg:#769ff0 bg:#212736)]($style)'

# ------------------------------------------------------------------------------
# LANGUAGES
# ------------------------------------------------------------------------------
[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "🐍"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

# ------------------------------------------------------------------------------
# UTILITY & SYSTEM
# ------------------------------------------------------------------------------
[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#1d2230"
format = '[[ ⏱ $duration ](fg:#e0af68 bg:#1d2230)]($style)'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯ ✘ $status_code](bold red)"
