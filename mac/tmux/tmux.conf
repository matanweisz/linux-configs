# =============================================================================
# tmux Configuration - Tokyo Night Theme
# =============================================================================

# ---- True color ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---- General ----
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g status-position top

# ---- Prefix: Ctrl+a ----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- Navigation (vim keys) ----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Splits ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ---- New window in current path ----
bind c new-window -c "#{pane_current_path}"

# ---- Resize ----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Copy mode (vi) ----
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ---- Reload ----
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ---- Tokyo Night Colors ----
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[default] "
set -g status-right "#[fg=#c0caf5] %H:%M "
set -g status-left-length 30

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "

# ---- Plugins (TPM) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ---- Session restore ----
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ---- Initialize TPM (must be last line) ----
run '~/.tmux/plugins/tpm/tpm'
